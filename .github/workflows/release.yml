# Tag-triggered release — push a tag like `v0.2.0` to build & publish the APK.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   SIGNING_KEYSTORE_BASE64   base64-encoded release keystore (no line breaks)
#   SIGNING_KEYSTORE_PASSWORD keystore password
#   SIGNING_KEY_ALIAS         key alias
#   SIGNING_KEY_PASSWORD      key password
#
# Generate a keystore once (macOS/Linux):
#   keytool -genkeypair -v -keystore release.keystore -alias nomad \
#     -keyalg RSA -keysize 2048 -validity 10000 -storetype PKCS12
#
# Encode for GitHub Secrets:
#   base64 < release.keystore | tr -d '\n'    # copy the single-line output
#
# Verify it round-trips correctly before pasting:
#   base64 < release.keystore | tr -d '\n' | base64 -d | md5sum
#   md5sum release.keystore
#   (both should match)

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION (tag $TAG, run ${{ github.run_number }})"

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "Keystore size: $(stat -c%s "$RUNNER_TEMP/release.keystore") bytes"
          keytool -list -keystore "$RUNNER_TEMP/release.keystore" \
            -storepass "${{ secrets.SIGNING_KEYSTORE_PASSWORD }}" -storetype PKCS12 2>&1 | head -5

      - name: Build release APK
        env:
          VERSION_NAME: ${{ steps.ver.outputs.version }}
          VERSION_CODE: ${{ github.run_number }}
          SIGNING_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-configuration-cache

      - name: Rename APK
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          cp "$APK" "nomad-${{ steps.ver.outputs.version }}.apk"

      - name: Generate changelog
        id: changelog
        run: |
          # Find the previous tag (the one before the current tag)
          PREV_TAG=$(git tag --sort=-creatordate | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            # First release — list all commits
            LOGS=$(git log --pretty=format:'- %s' --reverse)
          else
            LOGS=$(git log "${PREV_TAG}..HEAD" --pretty=format:'- %s' --reverse)
          fi
          # Write to file to preserve newlines
          {
            echo "## Changes"
            echo ""
            echo "$LOGS"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1)}...${{ github.ref_name }}"
          } > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nomad-${{ steps.ver.outputs.version }}.apk
          body_path: release_notes.md
