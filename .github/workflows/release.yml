# Tag-triggered release — push a tag like `v0.2.0` to build an AAB and
# publish it to Google Play Console.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   SIGNING_KEYSTORE_BASE64   base64-encoded upload keystore (no line breaks)
#   SIGNING_KEYSTORE_PASSWORD keystore password
#   SIGNING_KEY_ALIAS         key alias
#   SIGNING_KEY_PASSWORD      key password
#   PLAY_SERVICE_ACCOUNT_JSON Play Console service-account JSON key (raw JSON)
#
# One-time setup (see docs in README):
#   1. Google Play Console → Setup → API access → create a service account
#      with "Release manager" role, download its JSON key.
#   2. Upload the first AAB manually at least once — Play requires one
#      human-submitted release before the API can publish further updates.
#   3. Enroll in Play App Signing so Play manages the app signing key.
#      The keystore in this repo is the *upload* key, not the signing key.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION (tag $TAG, run ${{ github.run_number }})"

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build release AAB
        env:
          VERSION_NAME: ${{ steps.ver.outputs.version }}
          VERSION_CODE: ${{ github.run_number }}
          SIGNING_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease --no-configuration-cache

      - name: Locate AAB
        id: aab
        run: |
          AAB=$(find app/build/outputs/bundle/release -name '*.aab' | head -n1)
          echo "path=$AAB" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          mkdir -p distribution/whatsnew
          PREV_TAG=$(git tag --sort=-creatordate | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            LOGS=$(git log --pretty=format:'- %s' --reverse)
          else
            LOGS=$(git log "${PREV_TAG}..HEAD" --pretty=format:'- %s' --reverse)
          fi
          # Play allows up to 500 chars per locale; truncate defensively.
          printf '%s\n' "$LOGS" | head -c 480 > distribution/whatsnew/whatsnew-en-US.txt
          printf '%s\n' "$LOGS" | head -c 480 > distribution/whatsnew/whatsnew-ko-KR.txt

      - name: Upload to Play Console (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.nomad.travel
          releaseFiles: ${{ steps.aab.outputs.path }}
          track: internal
          status: completed
          whatsNewDirectory: distribution/whatsnew
